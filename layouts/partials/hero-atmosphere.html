{{/* Hero background — dark green gradient with fog */}}
<div class="absolute inset-0" style="background:
  radial-gradient(ellipse at 20% 50%, rgba(61,122,82,0.4) 0%, transparent 60%),
  radial-gradient(ellipse at 80% 20%, rgba(61,122,82,0.4) 0%, transparent 50%),
  radial-gradient(ellipse at 60% 80%, rgba(45,90,61,0.4) 0%, transparent 40%),
  linear-gradient(180deg, #1a3d2b 0%, #2d5a3d 100%);" aria-hidden="true"></div>

{{/* Film grain — cinematic atmosphere */}}
<div class="absolute inset-0 pointer-events-none" style="opacity:0.06;" aria-hidden="true">
  <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>
</div>
