{{/* Film grain — cinematic atmosphere */}}
<div class="absolute inset-0 pointer-events-none" style="opacity:0.04;" aria-hidden="true">
  <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>
</div>
{{/* Geometric dot grid overlay */}}
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" aria-hidden="true">
  <svg width="100%" height="100%">
    <defs>
      <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <circle cx="30" cy="30" r="1.5" fill="white"/>
        <line x1="0" y1="30" x2="60" y2="30" stroke="white" stroke-width="0.5" opacity="0.3"/>
        <line x1="30" y1="0" x2="30" y2="60" stroke="white" stroke-width="0.5" opacity="0.3"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </svg>
</div>
