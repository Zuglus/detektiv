<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .Title }}{{ .Title }} — {{ end }}{{ index .Site.Data.company.name .Lang }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ index .Site.Data.company.name .Lang }}{{ end }}">

<!-- Preload critical fonts (cyrillic + latin only) -->
<link rel="preload" href="/fonts/ibm-plex-sans-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/ibm-plex-sans-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/playfair-display-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/playfair-display-latin.woff2" as="font" type="font/woff2" crossorigin>

{{- $css := resources.Get "css/main.css" | postCSS | minify | fingerprint -}}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
